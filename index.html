<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Talking Tom Stats</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
  <header class="header">
    <div>
      <h1>Talking Tom Stats</h1>
      <p>Статистика каналов: подписчики, просмотры и количество видео</p>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="charts">Графики</button>
    <button class="tab" data-tab="top">Топ каналов Talking Tom</button>
    <button class="tab" data-tab="history">История</button>
  </nav>

  <main>
    <section id="charts" class="panel active">
      <div class="controls">
        <label>Канал
          <select id="channelSelect"></select>
        </label>
        <label>Год
          <select id="yearSelect"></select>
        </label>
        <button id="resetZoom">Сбросить масштаб</button>
      </div>

      <div class="cards">
        <div class="card"><span>Подписчики</span><strong id="subsNow">—</strong></div>
        <div class="card"><span>Просмотры</span><strong id="viewsNow">—</strong></div>
        <div class="card"><span>Видео</span><strong id="videosNow">—</strong></div>
        <div class="card"><span>Рост за год</span><strong id="yearGrowth">—</strong></div>
      </div>

      <div class="chartBox"><canvas id="statsChart"></canvas></div>
    </section>

    <section id="top" class="panel">
      <div class="controls">
        <label>Год
          <select id="topYearSelect"></select>
        </label>
        <label>Сортировка
          <select id="topSortSelect">
            <option value="subscribers">Подписчики</option>
            <option value="views">Просмотры</option>
            <option value="videos">Видео</option>
            <option value="subsGrowth">Прирост подписчиков</option>
            <option value="viewsGrowth">Прирост просмотров</option>
            <option value="videosGrowth">Новых видео</option>
          </select>
        </label>
      </div>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Канал</th>
              <th>Подписчики</th>
              <th>Просмотры</th>
              <th>Видео</th>
              <th>+ Подписчики</th>
              <th>+ Просмотры</th>
              <th>+ Видео</th>
            </tr>
          </thead>
          <tbody id="topTable"></tbody>
        </table>
      </div>
    </section>

    <section id="history" class="panel">
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Дата</th>
              <th>Канал</th>
              <th>Подписчики</th>
              <th>Просмотры</th>
              <th>Видео</th>
            </tr>
          </thead>
          <tbody id="historyTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
